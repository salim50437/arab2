        let userAnswers = {};

            renderQuestions();
        }

        function renderQuestions() {

            container.innerHTML = '';

            examData.sections.forEach(section => {
                const sectionDiv = document.createElement('section');
                sectionDiv.className = 'space-y-8';

                    <div class="bg-white border-r-8 border-blue-600 p-8 rounded-2xl shadow-sm relative overflow-hidden">
                        <p class="font-bold text-slate-400 text-sm mb-4">نص الفقرة المرفقة:</p>

                    </div>` : '';

                    <div class="flex items-center gap-4">
                        <div class="bg-slate-900 text-white p-3 rounded-xl shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>

                        <h3 class="text-2xl font-black text-slate-900 border-b-4 border-blue-600 pb-1">${section.title}</h3>
                    </div>
                    ${passageHTML}
                    <div class="grid gap-10"></div>
                `;

                const qGrid = sectionDiv.querySelector('.grid');
                section.questions.forEach((q, idx) => {
                    const qDiv = document.createElement('div');

                    let inputHTML = '';
                    if (q.type === 'mcq') {
                        inputHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                            ${q.options.map(opt => `
                                <button onclick="selectMCQ('${q.id}', '${opt}')" id="btn-${q.id}-${opt}" class="q-opt p-5 rounded-2xl text-right transition-all border-2 border-slate-50 bg-slate-50 text-slate-700 hover:bg-white hover:border-blue-200 font-bold flex items-center justify-between">
                                    <span>${opt}</span>
                                    <div class="dot w-5 h-5 rounded-full border-2 border-slate-300 bg-white"></div>
                                </button>
                            `).join('')}
                        </div>`;
                    } else {
                        inputHTML = `<div class="space-y-4 mt-6">
                            <textarea oninput="handleTextChange('${q.id}', this.value)" placeholder="اكتب إجابتك الكاملة هنا..." class="w-full p-6 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white outline-none min-h-[140px] font-medium text-lg transition-all"></textarea>
                        </div>`;
                    }

                    qDiv.innerHTML = `
                        <div class="flex items-start gap-5">
                            <span class="bg-blue-50 text-blue-600 w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0 font-black text-lg border border-blue-100">${idx + 1}</span>
                            <div class="flex-1">
                                <p class="text-xl font-bold text-slate-800 whitespace-pre-line">${q.text}</p>
                                <span class="text-xs font-black text-blue-500 mt-2 block tracking-widest uppercase">الدرجة: ${q.marks}</span>
                            </div>
                        </div>
                        ${inputHTML}
                    `;
                    qGrid.appendChild(qDiv);
                });

                container.appendChild(sectionDiv);
            });
        }

        function selectMCQ(qid, opt) {
            userAnswers[qid] = opt;
            // UI Update
            const btns = document.querySelectorAll(`[id^="btn-${qid}-"]`);
            btns.forEach(b => {
                b.classList.remove('bg-blue-600', 'border-blue-600', 'text-white');
                b.querySelector('.dot').classList.remove('bg-blue-600', 'border-white');
            });
            const selected = document.getElementById(`btn-${qid}-${opt}`);
            selected.classList.add('bg-blue-600', 'border-blue-600', 'text-white');
            selected.querySelector('.dot').classList.add('bg-blue-600', 'border-white');
            updateProgress();
        }

        function handleTextChange(qid, val) {
            if (val.trim()) {
                userAnswers[qid] = val;
            } else {
                delete userAnswers[qid];
            }
            updateProgress();
        }

        function updateProgress() {
            const count = Object.keys(userAnswers).length;
            const pct = (count / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').innerText = `تم حل ${count} من ${totalQuestions} سؤال`;
            
            const submitBtn = document.getElementById('submit-btn');
            if (count === totalQuestions) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-slate-200', 'text-slate-400');
                submitBtn.classList.add('bg-green-600', 'text-white', 'hover:bg-green-700');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('bg-slate-200', 'text-slate-400');
            }
        }

        function finishExam() {
            let score = 0;
            examData.sections.forEach(sec => {
                sec.questions.forEach(q => {
                    if (q.type === 'mcq') {
                        if (userAnswers[q.id] === q.correct) score += q.marks;
                    } else {
                        if (userAnswers[q.id] && userAnswers[q.id].length > 3) score += q.marks;
                    }
                });
            });

            const pct = (score / 40) * 100;
            document.getElementById('quiz-screen').classList.remove('step-active');
            document.getElementById('result-screen').classList.add('step-active');
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-percentage').innerText = pct.toFixed(1) + '%';
            
            const badge = document.getElementById('grade-badge');
            if (pct >= 90) badge.innerText = 'ممتاز جداً 🌟';
            else if (pct >= 75) badge.innerText = 'جيد جداً 👍';
            else if (pct >= 50) badge.innerText = 'ناجح ✅';
            else badge.innerText = 'تحتاج للمذاكرة 📚';

            renderReview();
        }

        function renderReview() {
            const container = document.getElementById('review-container');
            // Remove previous items but keep header
            const header = container.querySelector('h3');
            container.innerHTML = '';
            container.appendChild(header);

            examData.sections.forEach(sec => {
                const secH = document.createElement('h4');
                secH.className = 'bg-slate-800 text-white p-3 rounded-lg font-bold text-sm';
                secH.innerText = sec.title;
                container.appendChild(secH);

                sec.questions.forEach(q => {
                    const rev = document.createElement('div');
                    rev.className = 'p-6 rounded-2xl border-2 border-slate-100 bg-white shadow-sm space-y-4';
                    
                    const isCorrect = q.type === 'mcq' ? (userAnswers[q.id] === q.correct) : (userAnswers[q.id]?.length > 3);

                    rev.innerHTML = `
                        <p class="font-bold text-slate-800 whitespace-pre-line">${q.text}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                                <p class="text-xs text-slate-400 mb-2 font-bold">إجابتك:</p>
                                <p class="font-medium text-slate-700">${userAnswers[q.id] || "لم يتم الحل"}</p>
                            </div>
                            <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                                <p class="text-xs text-blue-500 mb-2 font-bold">نموذج الإجابة:</p>
                                <p class="font-bold text-blue-800">${q.type === 'mcq' ? q.correct : q.modelAnswer}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center border-t border-slate-50 pt-4">
                            <span class="text-sm font-black text-slate-500">الدرجة: ${isCorrect ? q.marks : 0} / ${q.marks}</span>
                            <span class="${isCorrect ? 'text-green-500' : 'text-red-500'} font-bold">${isCorrect ? '✅ صحيح' : '❌ خطأ'}</span>
                        </div>
                    `;
                    container.appendChild(rev);
                });
            });
        }

        function restartExam() {
            userAnswers = {};
            document.getElementById('result-screen').classList.remove('step-active');
            document.getElementById('intro-screen').classList.add('step-active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
